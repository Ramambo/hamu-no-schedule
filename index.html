<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>근무 스케줄</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <h1>📋 근무 스케줄</h1>

  <!-- 상단 바 -->
  <div class="top-bar">
    <div class="week-nav">
      <button class="btn" onclick="changeWeek(-1)">←</button>
      <span class="week-label" id="weekLabel"></span>
      <button class="btn" onclick="changeWeek(1)">→</button>
      <button class="btn" onclick="goToday()">오늘</button>
    </div>
    <div class="top-right">
      <span class="save-badge" id="saveIndicator"></span>
      <button class="btn" onclick="exportCSV()">💾 CSV 저장</button>
      <button class="btn primary" onclick="backupToGitHub()">☁️ GitHub 백업</button>
    </div>
  </div>

  <!-- 직원 필터 태그 -->
  <div class="staff-row" id="staffRow"></div>

  <!-- 스케줄 그리드 -->
  <div class="grid-card">
    <div class="grid-wrap">
      <div class="schedule-grid">
        <div class="grid-header" id="gridHeader"></div>
        <div id="gridBody"></div>
      </div>
    </div>
  </div>

  <div class="legend">
    <span class="legend-dot"></span> 3명 이상 겹침 경고
  </div>

  <!-- 직원 관리 (details 제거 → 항상 보임) -->
  <div class="section">
    <div class="section-title" onclick="toggleSection()">
      <span>👥 직원 관리</span>
      <span class="section-arrow" id="sectionArrow">▼</span>
    </div>
    <div class="section-body" id="sectionBody">
      <div class="staff-manage-list" id="staffManageList"></div>
      <div class="add-staff-row">
        <input type="text" id="newStaffName" placeholder="새 직원 이름" maxlength="10"
          onkeydown="if(event.key==='Enter') addStaff()" />
        <button class="btn primary" onclick="addStaff()">+ 추가</button>
      </div>
    </div>
  </div>
</div>

<!-- 근무 편집 모달 -->
<div class="modal-bg" id="modal" style="display:none;" onclick="closeModalBg(event)">
  <div class="modal">
    <h3 id="modalTitle"></h3>
    <div class="modal-staff-grid" id="modalStaffGrid"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">취소</button>
      <button class="btn primary" onclick="saveModal()">저장</button>
    </div>
  </div>
</div>

<!-- 직원 편집 모달 -->
<div class="modal-bg" id="editStaffModal" style="display:none;" onclick="closeEditModalBg(event)">
  <div class="modal">
    <h3>직원 편집</h3>
    <div class="edit-staff-form">
      <label>이름</label>
      <input type="text" id="editStaffName" maxlength="10" />
      <label>색상</label>
      <div class="color-palette" id="colorPalette"></div>
    </div>
    <div class="modal-actions">
      <button class="btn danger" onclick="deleteStaff()">삭제</button>
      <div style="flex:1"></div>
      <button class="btn" onclick="closeEditModal()">취소</button>
      <button class="btn primary" onclick="saveEditStaff()">저장</button>
    </div>
  </div>
</div>

<!-- GitHub 백업 모달 -->
<div class="modal-bg" id="backupModal" style="display:none;" onclick="closeBackupModalBg(event)">
  <div class="modal">
    <h3>☁️ GitHub 백업</h3>
    <p class="modal-desc" id="backupStatus">스케줄 데이터를 GitHub에 저장합니다.</p>
    <div class="modal-actions">
      <button class="btn" onclick="closeBackupModal()">취소</button>
      <button class="btn primary" id="backupConfirmBtn" onclick="confirmBackup()">백업 시작</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
