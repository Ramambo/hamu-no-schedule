<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>근무 스케줄</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <h1>📋 근무 스케줄</h1>

  <div class="top-bar">
    <div class="week-nav">
      <button class="btn" onclick="changeWeek(-1)">←</button>
      <span class="week-label" id="weekLabel"></span>
      <button class="btn" onclick="changeWeek(1)">→</button>
      <button class="btn" onclick="goToday()">오늘</button>
    </div>
    <div class="top-right">
      <span class="save-badge" id="saveIndicator"></span>
      <button class="btn primary" onclick="exportCSV()">💾 CSV 저장</button>
    </div>
  </div>

  <div class="staff-row" id="staffRow"></div>

  <div class="grid-card">
    <div class="grid-wrap">
      <div class="schedule-grid">
        <div class="grid-header" id="gridHeader"></div>
        <div id="gridBody"></div>
      </div>
    </div>
  </div>

  <div class="legend">
    <span class="legend-dot"></span> 3명 이상 겹침 경고
  </div>

  <details class="section">
    <summary>👥 직원 관리</summary>
    <div class="staff-manage-list" id="staffManageList"></div>
    <div class="add-staff-row">
      <input type="text" id="newStaffName" placeholder="새 직원 이름" maxlength="10" />
      <button class="btn primary" onclick="addStaff()">+ 추가</button>
    </div>
  </details>
</div>

<!-- 근무 편집 모달 -->
<div class="modal-bg" id="modal" style="display:none;" onclick="closeModalBg(event)">
  <div class="modal">
    <h3 id="modalTitle"></h3>
    <div class="modal-staff-grid" id="modalStaffGrid"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">취소</button>
      <button class="btn primary" onclick="saveModal()">저장</button>
    </div>
  </div>
</div>

<!-- 직원 편집 모달 -->
<div class="modal-bg" id="editStaffModal" style="display:none;" onclick="closeEditModalBg(event)">
  <div class="modal">
    <h3>직원 편집</h3>
    <div class="edit-staff-form">
      <label>이름</label>
      <input type="text" id="editStaffName" maxlength="10" />
      <label style="margin-top:12px;">색상</label>
      <div class="color-palette" id="colorPalette"></div>
    </div>
    <div class="modal-actions">
      <button class="btn danger" onclick="deleteStaff()">삭제</button>
      <div style="flex:1"></div>
      <button class="btn" onclick="closeEditModal()">취소</button>
      <button class="btn primary" onclick="saveEditStaff()">저장</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
